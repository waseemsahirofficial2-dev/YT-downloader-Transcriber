name: YouTube Downloader & Transcriber

on:
  workflow_dispatch:
    inputs:
      youtube_url:
        description: 'YouTube Video URL'
        required: true
        type: string
      action:
        description: 'What do you want to do?'
        required: true
        type: choice
        default: 'video_1080p'
        options:
          - video_1080p
          - video_720p
          - video_480p
          - audio
          - audio_transcript
      language_code:
        description: 'Transcription Language Code (e.g., en, ar, fr, de, pt)'
        required: false
        type: string
        default: 'en'

permissions:
  actions: write
  contents: read

jobs:
  download_and_process:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Disable IPv6 & Install Cloudflare WARP
        run: |
          sudo sysctl -w net.ipv6.conf.all.disable_ipv6=1
          sudo sysctl -w net.ipv6.conf.default.disable_ipv6=1
          
          curl -fsSL https://pkg.cloudflareclient.com/pubkey.gpg | sudo gpg --yes --dearmor --output /usr/share/keyrings/cloudflare-warp-archive-keyring.gpg
          echo "deb [signed-by=/usr/share/keyrings/cloudflare-warp-archive-keyring.gpg] https://pkg.cloudflareclient.com/ $(lsb_release -cs) main" | sudo tee /etc/apt/sources.list.d/cloudflare-client.list
          sudo apt-get update && sudo apt-get install -y cloudflare-warp
          
          warp-cli --accept-tos registration new
          warp-cli --accept-tos mode proxy || warp-cli --accept-tos set-mode proxy
          warp-cli --accept-tos proxy port 40000 || warp-cli --accept-tos set-proxy-port 40000
          warp-cli --accept-tos connect
          sleep 10

      - name: Verify Normal IP vs Proxy IP
        run: |
          echo "Normal GitHub IP (Google APIs will use this):"
          curl -4 -s https://ifconfig.me
          echo -e "\nCloudflare WARP Proxy IP (YouTube will use this):"
          curl -x socks5://127.0.0.1:40000 -4 -s https://ifconfig.me

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install System Dependencies (FFmpeg)
        run: |
          sudo apt-get update
          sudo apt-get install ffmpeg -y

      - name: Install Python Dependencies
        run: |
          pip install -r requirements.txt
          pip install -U --pre "yt-dlp[default]"

      - name: Run Python Script
        env:
          ACTION: ${{ github.event.inputs.action }}
          YOUTUBE_URL: ${{ github.event.inputs.youtube_url }}
          ASSEMBLYAI_API_KEY: ${{ secrets.ASSEMBLYAI_API_KEY }}
          LANGUAGE_CODE: ${{ github.event.inputs.language_code }}
        run: python app.py

      - name: Upload Unzipped Files to GitHub Releases
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
          REPO: ${{ github.repository }}
          RUN_ID: ${{ github.run_id }}
        run: |
          TAG_NAME="download-${RUN_ID}"
          TITLE="YouTube Download - Run ${RUN_ID}"
          
          echo "📦 Creating Release: $TAG_NAME..."
          gh release create "$TAG_NAME" --title "$TITLE" --notes "Automated file host generated via Actions."
          
          echo "### 📥 Direct Download Links" >> $GITHUB_STEP_SUMMARY
          echo "Files are securely hosted on GitHub servers. Right-click and 'Save Link As...' to download." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          if [ -f "output_file.mp4" ]; then
            echo "   ⬆️ Uploading MP4 to Release..."
            gh release upload "$TAG_NAME" output_file.mp4
            echo "- 🎥 **Video File:** [Download output_file.mp4](https://github.com/$REPO/releases/download/$TAG_NAME/output_file.mp4)" >> $GITHUB_STEP_SUMMARY
          fi
          
          if [ -f "output_file.mp3" ]; then
            echo "   ⬆️ Uploading MP3 to Release..."
            gh release upload "$TAG_NAME" output_file.mp3
            echo "- 🎵 **Audio File:** [Download output_file.mp3](https://github.com/$REPO/releases/download/$TAG_NAME/output_file.mp3)" >> $GITHUB_STEP_SUMMARY
          fi
          
          if [ -f "transcript.txt" ]; then
            echo "   ⬆️ Uploading Transcript to Release..."
            gh release upload "$TAG_NAME" transcript.txt
            echo "- 📝 **Transcript:** [Download transcript.txt](https://github.com/$REPO/releases/download/$TAG_NAME/transcript.txt)" >> $GITHUB_STEP_SUMMARY
          fi
